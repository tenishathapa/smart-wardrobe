{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center animate-fadeIn">
  <div class="col-lg-5">
    <div class="card" style="border: 1px solid var(--border);">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
            <i class="bi bi-person-fill" style="font-size: 2.5rem; color: #fff;"></i>
          </div>
          <h3 class="mb-0" style="font-size: 1.4rem;">{{ current_user.name }}</h3>
          <p style="color: var(--text-muted);">{{ current_user.email }}</p>
        </div>
        <hr style="border-color: var(--border);">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" value="{{ current_user.name }}">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ current_user.email }}">
          </div>
          <hr style="border-color: var(--border);">
          <h5 style="font-family: var(--font-display); font-size: 1rem; margin-bottom: 1rem;">Change Password</h5>
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" name="current_password" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary w-100">Update Profile</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
