{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center animate-fadeIn">
  <div class="col-lg-6">
    <div class="card" style="border: 1px solid var(--border);">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <div>
            <h3 class="mb-1" style="font-family: var(--font-display);"><i class="bi bi-geo-alt-fill" style="color: var(--pink);"></i> {{ p_list.destination }}</h3>
            <p style="color: var(--text-muted); margin: 0;">{{ p_list.days }} days · {{ p_list.season }}</p>
          </div>
          <form method="POST" action="{{ url_for('packing.delete', list_id=p_list.id) }}" onsubmit="return confirm('Delete this packing list?')">
            <button class="btn btn-sm" style="background: #fde8e0; color: #c0392b; border: none; border-radius: 8px;"><i class="bi bi-trash"></i></button>
          </form>
        </div>

        <h5 style="font-family: var(--font-display); margin-bottom: 1rem;">Packing Suggestions</h5>
        <div class="d-flex flex-column gap-2">
          {% for item in p_list.items %}
          <div class="card" style="border: 1px solid var(--border);">
            <div class="card-body py-3 px-4 d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center gap-2">
                <span class="badge" style="background: var(--pink-lighter); color: var(--pink-deep);">{{ item.clothing_item.category }}</span>
                <span>{{ item.clothing_item.name }}</span>
              </div>
              <span class="badge" style="background: var(--gradient); color: #fff;">x{{ item.quantity }}</span>
            </div>
          </div>
          {% endfor %}
        </div>

        <a href="{{ url_for('packing.index') }}" class="btn btn-outline-primary mt-4"><i class="bi bi-arrow-left"></i> Back</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
